services:
  openclaw:
    command: openclaw gateway
    build: .
    environment:
      - 'GITHUB_TOKEN=${GITHUB_TOKEN}'
      - SERVICE_FQDN_OPENCLAW_8080
      - AUTH_USERNAME=$SERVICE_USER_OPENCLAW
      - AUTH_PASSWORD=$SERVICE_PASSWORD_OPENCLAW
      - OPENCLAW_GATEWAY_TOKEN=$SERVICE_PASSWORD_64_GATEWAYTOKEN
      - 'ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY}'
      - 'OPENROUTER_API_KEY=${OPENROUTER_API_KEY}'
      - 'GEMINI_API_KEY=${GEMINI_API_KEY}'
      - 'XAI_API_KEY=${XAI_API_KEY}'
      - 'GROQ_API_KEY=${GROQ_API_KEY}'
      - 'MISTRAL_API_KEY=${MISTRAL_API_KEY}'
      - 'CEREBRAS_API_KEY=${CEREBRAS_API_KEY}'
      - 'VENICE_API_KEY=${VENICE_API_KEY}'
      - 'MOONSHOT_API_KEY=${MOONSHOT_API_KEY}'
      - 'KIMI_API_KEY=${KIMI_API_KEY}'
      - 'MINIMAX_API_KEY=${MINIMAX_API_KEY}'
      - 'ZAI_API_KEY=${ZAI_API_KEY}'
      - 'AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY}'
      - 'OPENCODE_API_KEY=${OPENCODE_API_KEY}'
      - 'SYNTHETIC_API_KEY=${SYNTHETIC_API_KEY}'
      - 'COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}'
      - 'XIAOMI_API_KEY=${XIAOMI_API_KEY}'
      - 'OPENCLAW_PRIMARY_MODEL=${OPENCLAW_PRIMARY_MODEL}'
      - 'DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}'
      - 'AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}'
      - 'AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}'
      - 'AWS_REGION=${AWS_REGION:-us-east-1}'
      - 'AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}'
      - 'BEDROCK_PROVIDER_FILTER=${BEDROCK_PROVIDER_FILTER:-anthropic}'
      - 'OLLAMA_BASE_URL=${OLLAMA_BASE_URL}'
      - PORT=8080
      - OPENCLAW_GATEWAY_PORT=18789
      - 'OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND:-lan}'
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/data/workspace
      - 'BROWSER_CDP_URL=http://browser:9222'
      - 'BROWSER_DEFAULT_PROFILE=${BROWSER_DEFAULT_PROFILE:-remote}'
      - 'BROWSER_EVALUATE_ENABLED=${BROWSER_EVALUATE_ENABLED:-true}'
      - 'BROWSER_SNAPSHOT_MODE=${BROWSER_SNAPSHOT_MODE:-efficient}'
      - 'BROWSER_REMOTE_TIMEOUT_MS=${BROWSER_REMOTE_TIMEOUT_MS:-1500}'
      - 'BROWSER_REMOTE_HANDSHAKE_TIMEOUT_MS=${BROWSER_REMOTE_HANDSHAKE_TIMEOUT_MS:-3000}'
      - 'HOOKS_ENABLED=${HOOKS_ENABLED:-false}'
      - 'HOOKS_PATH=${HOOKS_PATH:-/hooks}'
      - 'MOONSHOT_BASE_URL=${MOONSHOT_BASE_URL:-https://api.moonshot.cn}'
      - 'KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn}'
      - TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
      - DISCORD_BOT_TOKEN=$DISCORD_BOT_TOKEN
      - SLACK_BOT_TOKEN=$SLACK_BOT_TOKEN
      - SLACK_APP_TOKEN=$SLACK_APP_TOKEN
      - WHATSAPP_ENABLED=$WHATSAPP_ENABLED
      - OPENCLAW_DOCKER_APT_PACKAGES=$OPENCLAW_DOCKER_APT_PACKAGES
      - OPENCLAW_SANDBOX=1
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
    volumes:
      - 'openclaw-data:/data'
      - '/dev/shm:/dev/shm'
    shm_size: '2gb' # ✓ Service-level property, NOT a volume
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    depends_on:
      browser:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - '-sf'
        - 'http://127.0.0.1:8080/healthz'
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 90s

  browser:
    image: 'coollabsio/openclaw-browser:latest'
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - 'CHROME_CLI=--remote-debugging-port=9222 --no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage --disable-gpu'
    volumes:
      - 'browser-data:/config'
      - '/dev/shm:/dev/shm'
    shm_size: '2gb' # ✓ Service-level property
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c ':> /dev/tcp/127.0.0.1/9222' || exit 1"
      interval: 5s
      timeout: 5s
      retries: 10

  paperclip:
    image: obehiaye/paperclip:latest
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3100
      - SERVE_UI=true
      - PAPERCLIP_HOME=/paperclip
      - PAPERCLIP_INSTANCE_ID=default
      - PAPERCLIP_CONFIG=/paperclip/instances/default/config.json
      - DATABASE_URL=postgresql://neondb_owner:npg_ou2hlK7gIzbx@ep-shy-frog-ad02q0uh-pooler.c-2.us-east-1.aws.neon.tech/paperclip2?sslmode=require&channel_binding=require
    volumes:
      - paperclip-data:/paperclip
      - openclaw-data:/data
    ports:
      - '3101:3100'
    depends_on:
      openclaw:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - '-sf'
        - 'http://127.0.0.1:3100/api/health'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  default:

volumes:
  openclaw-data:
  browser-data:
  paperclip-data:
